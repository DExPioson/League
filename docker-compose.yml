services:
  postgres:
    image: postgres:16
    container_name: football_league_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: football_league
    ports:
      - "5432:5432"
    volumes:
      - football_league_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: football_league_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  football_league_pgdata:
